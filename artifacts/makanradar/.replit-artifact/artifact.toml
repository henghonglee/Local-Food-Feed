kind = "web"
previewPath = "/"
title = "MakanRadar"
version = "1.0.0"
id = "artifacts/makanradar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23241

[services.development]
run = "pnpm --filter @workspace/makanradar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/makanradar", "run", "build" ]
publicDir = "artifacts/makanradar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23241"
BASE_PATH = "/"
